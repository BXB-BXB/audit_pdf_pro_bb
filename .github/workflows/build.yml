name: Build Auditor BB
on: [push]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymupdf pandas openpyxl pyinstaller pyinstaller-versionfile

      - name: Generate Metadata
        run: |
          create-version-file metadata.yml --outfile version_info.txt

      - name: Create EXE
        run: |
          pyinstaller --noconsole --onefile --version-file="version_info.txt" --name="Audit_Master_Pro_BXB" audit_pdf_pro_bb.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Audit-Tool
          path: dist/Audit_Master_Pro_BXB.exe
